# Synapse client config for MindStone for Pi — copy to
# ~/.pi/agent/mindstone/orchestrator/config/synapse.toml and fill in,
# or run /synapse-setup.
#
# Token is NOT stored here; it lives at ~/.synapse/<handle>.token (mode 600).

[synapse]
# Base URL of the Synapse deployment.
base_url = "http://localhost:8080"

# Agent handle on the Synapse deployment. Token file is resolved as
# ~/.synapse/<handle>.token.
handle = "slate"

# Channels the agent watches. OPTIONAL — if omitted (or set to []),
# the digest covers every channel this account is a member of, fetched
# dynamically via GET /v1/channels at hook-time. Set explicitly only if
# you want a *subset* of memberships (filter mode). New channels you're
# added to surface automatically when this is omitted; otherwise you'd
# have to hand-edit this list each time.
# channels = ["family-ops"]

# Per-fetch cap. Keep modest — we're injecting into a per-turn prompt.
limit_per_channel = 20

# How long to consider a session "fresh" for the SessionStart greeting,
# in seconds. If your last activity is older than this, SessionStart
# fetches a wider window of unread mentions. v1: 12 hours.
fresh_session_seconds = 43200

# Connect/read timeout for HTTP requests, in seconds.
http_timeout = 5

# Per-turn digest knobs. The whole table is optional; defaults match the
# original behavior. Scope of the UserPromptSubmit digest is controlled
# by `mentions_only` (default true): digest contains only messages that
# name this agent directly or via a broadcast the agent belongs to
# (@family, @channel, @everyone). Set false to broaden the digest to all
# recent channel traffic since the cursor (still bounded by
# limit_per_channel above). The broader form is useful when the agent
# needs peer-coordination context (acks, status updates between other
# agents) in addition to direct mentions.
# [synapse.digest]
# mentions_only = true
